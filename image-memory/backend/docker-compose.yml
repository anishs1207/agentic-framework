version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agentic_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d agentic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: backend_app
    ports:
      - "3001:3001"
    environment:
      # Use the container name 'db' as the hostname
      DATABASE_URL: postgresql://user:password@db:5432/agentic_db?schema=public
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  postgres_data:
