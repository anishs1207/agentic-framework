# Deployment: used to always run the cli
# manages a set of pods to run an appln workload
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-cli
  template:
    metadata:
      labels:
        app: agent-cli
    spec:
      containers:
        - name: agent-cli
          # this is the image from dockerhub used here by default
          # pulls the image if not present locally
          image: agent-cli
          imagePullPolicy: Never
          # to ensure it uses the local k8 kind cluster
          envFrom:
            - secretRef:
                name: agent-cli-secret
